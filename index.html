<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical Shop Management - Bangladesh Pharmacy Hub</title>
    <script>
      (function() {
        try {
          var origFetch = window.fetch;
          var fetchVal = origFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchVal;
            },
            set: function(val) {
              fetchVal = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to define window.fetch property descriptor:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
